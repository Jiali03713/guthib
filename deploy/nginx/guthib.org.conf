server {
    listen 80;
    listen [::]:80;
    server_name guthib.org www.guthib.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name guthib.org www.guthib.org;

    root /var/www/guthib;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/guthib.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guthib.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ =404;
    }
}
