name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.VM_PATH }}
            git pull origin main
            sudo mkdir -p /var/www/guthib
            sudo cp -a guthib/. /var/www/guthib/
            sudo chown -R www-data:www-data /var/www/guthib
            sudo chmod -R a+rX /var/www/guthib
